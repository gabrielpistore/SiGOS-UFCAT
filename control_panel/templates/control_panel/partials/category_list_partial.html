{% for category in categories %}
  <div id="category-{{ category.id }}"
       class="flex justify-between p-3 text-base border-b">
    <p>{{ category.name }}</p>
    {% comment %} <button hx-delete="{% url "control_panel:department_delete" category.id %}"
            hx-confirm="Tem certeza que deseja excluir este departamento?"
            hx-on::after-request="window.location.reload()">
      <i class="fa-solid fa-trash text-primary"></i>
    </button> {% endcomment %}
  </div>
{% endfor %}
{% if categories.has_next %}
  <div hx-get="?page={{ categories.next_page_number }}"
       hx-trigger="intersect once"
       hx-swap="afterend"
       hx-target="this"
       hx-indicator="#loading-spinner"></div>
{% endif %}
